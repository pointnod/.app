<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Pixel Art Pro | .app</title>
  <link rel="stylesheet" href="css/design-rules.css" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎨</text></svg>">
</head>
<body class="ui-mode-locked">
  <div id="app">

    <!-- TOP BAR -->
    <aside id="sidebar-up" class="glass sidebar-main">
      <div class="upbar-left">
        <span class="app-logo">🎨 Pixel Art Module</span>
      </div>
      <div class="upbar-center">
        <span id="system-path">.app / module / Texture Editor</span>
      </div>
      <div class="upbar-right">
        <nav class="header-actions">
          <button id="uiModeBtn" class="sidebar-circle" data-tooltip="UI Visibility Mode">
            <svg id="ui-mode-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></svg>
          </button>
          <button id="exportBtn"       class="action-btn" data-tooltip="Export PNG (1:1)">Export</button>
          <button id="exportScaledBtn" class="action-btn" data-tooltip="Export HD (20x)">HD</button>
          <button id="downloadJSON"    class="action-btn" data-tooltip="Save Project (.json)">Save</button>
          <label  class="action-btn"  data-tooltip="Load Project (.json)">
            Load <input id="loadJSON" type="file" accept="application/json" style="display:none">
          </label>
        </nav>
      </div>
    </aside>

    <!-- WORKSPACE -->
    <main id="workspace-center">
      <div id="canvas-container">
        <div id="ruler-h" class="ruler"></div>
        <div id="ruler-v" class="ruler"></div>
        <div id="canvas-viewport">
          <canvas id="gridCanvas"></canvas>
          <canvas id="paintCanvas"></canvas>
        </div>
      </div>
    </main>

    <!-- LEFT SIDEBAR — module navigation -->
    <aside id="sidebar-left" class="glass sidebar-main container">
      <div class="nav-modules" role="menubar">
        <button class="sidebar-circle active" data-tooltip="Texture Editor" data-module="pixels">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 3v18"/></svg>
        </button>
        <button class="sidebar-circle" data-tooltip="Dashboard" data-module="dashboard">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        </button>
        <button class="sidebar-circle" data-tooltip="Projects Manager" data-module="projects">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg>
        </button>
        <button class="sidebar-circle" data-tooltip="Logic & Scripting" data-module="code">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
        </button>
        <div class="v-divider"></div>
        <button id="switchSidebarBtn" class="sidebar-circle" data-tooltip="Mirror UI Layout">⇄</button>
      </div>
    </aside>

    <!-- RIGHT SIDEBAR — drawing tools -->
    <aside id="sidebar-right" class="glass sidebar-main container">
      <div class="tool-panel" role="toolbar" data-for-module="pixels" style="display:flex;">
        <button class="tool active sidebar-circle" data-tool="pencil" data-tooltip="Pencil (P)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19l7-7 3 3-7 7-3-3z"/><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/><path d="M2 2l5 5"/></svg>
        </button>
        <button class="tool sidebar-circle" data-tool="eraser" data-tooltip="Eraser (E)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M20 20H7L3 16C2 15 2 13 3 12L13 2L22 11L20 20Z"/><path d="M17 11L11 5"/></svg>
        </button>
        <button class="tool sidebar-circle" data-tool="fill" data-tooltip="Flood Fill (F)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 12l10 10 10-10L12 2z"/><path d="M7 12h10"/></svg>
        </button>
        <button class="tool sidebar-circle" data-tool="picker" data-tooltip="Color Picker (C)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2L15 9l-4 4l-2 5l-3 3l-4-4l3-3l5-2l4-4l7-7z"/><circle cx="11" cy="13" r="1"/></svg>
        </button>
        <div class="v-divider"></div>
        <button id="undoBtn" class="sidebar-circle" data-tooltip="Undo (Ctrl+Z)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9 14L4 9l5-5"/><path d="M20 20v-7a4 4 0 00-4-4H4"/></svg>
        </button>
        <button id="redoBtn" class="sidebar-circle" data-tooltip="Redo (Ctrl+Y)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M15 14l5-5-5-5"/><path d="M4 20v-7a4 4 0 014-4h12"/></svg>
        </button>
        <div class="v-divider"></div>
        <button id="mirrorVBtn" class="sidebar-circle" data-tooltip="Mirror Vertical">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v20M2 12l5-5M2 12l5 5M22 12l-5-5M22 12l5 5"/></svg>
        </button>
        <button id="mirrorHBtn" class="sidebar-circle" data-tooltip="Mirror Horizontal">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12h20M12 2l-5 5M12 2l5 5M12 22l-5-5M12 22l5-5"/></svg>
        </button>
        <button id="gridToggle" class="sidebar-circle active" data-tooltip="Toggle Grid (G)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 3v18M15 3v18M3 9h18M3 15h18"/></svg>
        </button>
        <div class="v-divider"></div>
        <button id="clearBtn" class="sidebar-circle danger" data-tooltip="Clear Canvas (Del)">🗑️</button>
      </div>
    </aside>

    <!-- RIGHT SUB-SIDEBAR — color, grid, preview controls -->
    <aside id="sub-sidebar-right" class="glass sidebar-main sub-sidebar">
      <div class="subpanel" data-for-module="pixels" style="display:flex;">
        <div class="status-group">
          <label class="label-text">Harmony</label>
          <select id="palettePreset" class="glass-select" data-tooltip="Palette Algorithm">
            <option value="monochrome">Monochrome</option>
            <option value="analogous">Analogous</option>
            <option value="complementary">Complementary</option>
            <option value="gradient">Gradient</option>
            <option value="triadic">Triadic</option>
          </select>
        </div>
        <div class="v-divider"></div>
        <div class="status-group">
          <label class="label-text">Grid Size</label>
          <input type="range"  id="sizeSlider" min="8" max="128" value="32">
          <input type="number" id="sizeInput"  min="8" max="128" value="32">
        </div>
        <div class="status-group">
          <label class="label-text">Zoom</label>
          <input type="range"  id="scaleSlider" min="4" max="40" value="12">
          <input type="number" id="scaleInput"  min="4" max="40" value="12">
          <button id="resizeBtn" class="action-btn" data-tooltip="Apply Grid Transformation">Set</button>
        </div>
        <div class="v-divider"></div>
        <div class="preview-mini">
          <div id="previewWrap" class="glass" data-tooltip="Live Preview">
            <canvas id="previewCanvas" width="32" height="32"></canvas>
          </div>
        </div>
        <div class="v-divider"></div>
        <div id="paletteRow" class="palette-artist-row">
          <div class="color-picker-wrap circle-tool" title="Add Custom Color">
            <input id="addColor" type="color" value="#e5cf82">
          </div>
          <button id="randomPalette" class="sidebar-circle circle-tool" data-tooltip="Shuffle Palette">⟳</button>
        </div>
      </div>
    </aside>

    <!-- BOTTOM BAR — status -->
    <aside id="sidebar-down" class="glass sidebar-main">
      <div class="status-layer">
        <span id="status-message">Module: Texture Editor | Tool: PENCIL</span>
        <span id="pixel-count">0 Pixels</span>
        <span id="system-metrics">Engine: Ready</span>
      </div>
    </aside>
  </div>

  <!-- Floating help -->
  <button id="helpBtn" class="glass floating-help" title="Tutorial">?</button>

  <!-- Tutorial overlay -->
  <div id="tutorialOverlay" class="glass-overlay" aria-hidden="true">
    <div id="tutorialModal" class="glass">
      <h3 id="tutorialTitle">Pixel Guide</h3>
      <div id="tutorialContent"></div>
      <div id="tutorialControls">
        <button id="tutorialPrev" class="glass-btn">Back</button>
        <button id="tutorialNext" class="glass-btn primary">Next</button>
      </div>
      <button id="tutorialClose" class="close-btn">&times;</button>
    </div>
  </div>

  <!-- Entry point — ES module -->
  <script type="module" src=".app/App.js"></script>
</body>
</html>
